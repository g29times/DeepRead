<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>DeepRead 深度阅读助手</title>
    <link rel="stylesheet" href="popup-style.css">
    <style>
        body {
            width: 320px;
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            padding: 10px;
        }
        .header {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
        }
        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #4CAF50;
            margin-right: 10px;
        }
        h1 {
            font-size: 18px;
            margin: 0;
            color: #333;
        }
        .description {
            color: #666;
            margin-bottom: 15px;
            font-size: 14px;
            line-height: 1.4;
        }
        .button-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        button {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #45a049;
        }
        .status {
            margin-top: 15px;
            padding: 10px;
            background-color: #f5f5f5;
            border-radius: 4px;
            font-size: 13px;
        }
        .footer {
            margin-top: 15px;
            font-size: 12px;
            color: #999;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">DR</div>
        <h1>DeepRead 深度阅读助手</h1>
    </div>
    
    <div class="description">
        提供智能解读和交互式导航的深度阅读助手，帮助您理解复杂文章和专业术语。
    </div>

    <div class="status" style="margin-top: 0;">
        <div style="font-weight: 700; margin-bottom: 6px;">配置</div>
        <div style="display:flex; flex-direction:column; gap:8px;">
            <div>
                <div style="font-size:12px; color:#555; margin-bottom:4px;">Google Gemini API Key</div>
                <input id="dr-popup-api-key" type="password" placeholder="输入您的 API Key..." style="width:100%; box-sizing:border-box; padding:8px; border:1px solid #ddd; border-radius:4px;" />
            </div>
            <div>
                <div style="font-size:12px; color:#555; margin-bottom:4px;">模型</div>
                <select id="dr-popup-model" style="width:100%; box-sizing:border-box; padding:8px; border:1px solid #ddd; border-radius:4px;">
                    <option value="gemini-2.5-flash-lite">gemini-2.5-flash-lite</option>
                    <option value="gemini-flash-lite-latest">gemini-flash-lite-latest</option>
                    <option value="gemini-3-flash-preview">gemini-3-flash-preview</option>
                    <option value="custom">自定义模型...</option>
                </select>
                <input id="dr-popup-model-custom" type="text" placeholder="输入自定义模型名称..." style="display:none; width:100%; box-sizing:border-box; padding:8px; border:1px solid #ddd; border-radius:4px; margin-top:8px;" />
            </div>
            <div>
                <div style="font-size:12px; color:#555; margin-bottom:4px;">Thinking Level</div>
                <div style="display:flex; gap:8px; align-items:center;">
                    <input id="dr-popup-thinking" type="range" min="0" max="3" value="0" step="1" style="flex:1;" />
                    <div id="dr-popup-thinking-label" style="min-width:70px; text-align:right; font-size:12px; color:#333;">MINIMAL</div>
                </div>
                <div style="display:flex; justify-content:space-between; font-size:11px; color:#777; margin-top:4px;">
                    <span>MINIMAL</span>
                    <span>LOW</span>
                    <span>MEDIUM</span>
                    <span>HIGH</span>
                </div>
            </div>
            <div>
                <div style="font-size:12px; color:#555; margin-bottom:4px;">Feishu Webhook URL（可选）</div>
                <input id="dr-popup-feishu" type="text" placeholder="https://www.feishu.cn/flow/api/trigger-webhook/..." style="width:100%; box-sizing:border-box; padding:8px; border:1px solid #ddd; border-radius:4px;" />
            </div>
            <div style="display:flex; gap:8px;">
                <button id="dr-popup-save" style="flex:1;">保存设置</button>
                <button id="dr-popup-open-sidepanel" style="flex:1; background:#111827;">打开侧栏</button>
            </div>
            <div style="font-size:12px; color:#666;">
                <a href="https://aistudio.google.com/apikey" target="_blank" rel="noreferrer">获取 Gemini API Key</a>
            </div>
        </div>
    </div>
    
    <div class="button-container">
        <button id="startReading">开始深度阅读（分析当前页面）</button>
        <button id="togglePanel">显示/隐藏面板（旧）</button>
    </div>
    
    <div class="status" id="status">
        状态: 准备就绪，点击"开始深度阅读"分析当前页面。
    </div>
    
    <div class="footer">
        DeepRead v1.0 - 让阅读更深入，理解更全面
    </div>
    
    <script src="popup.js"></script>
</body>
</html>
